<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Te buscamos para votar — Red Iguazú</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{--selva:#0f3d2e;--tierra:#b5491f;--arena:#f5f1e8;--arena-2:#ece5d6;--tinta:#1c2a23;--gris:#6b756f;--linea:#d8d0bf;--verde-ok:#2e8b57;--rojo:#c0432f;--azul:#2c5f7c;--blanco:#fffdf8}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{font-family:system-ui,-apple-system,'Segoe UI',sans-serif;background:linear-gradient(160deg,var(--selva),#16573f);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:18px}
  .card{background:var(--blanco);border-radius:22px;padding:28px 24px;width:100%;max-width:440px;box-shadow:0 20px 60px rgba(0,0,0,.35)}
  h1{font-size:21px;color:var(--selva);letter-spacing:-.02em}
  .sub{color:var(--gris);font-size:14px;margin:10px 0 22px;line-height:1.5}
  label{display:block;font-size:12.5px;font-weight:700;color:var(--selva);margin:0 0 6px;text-transform:uppercase;letter-spacing:.04em}
  input{width:100%;padding:14px;border:1.5px solid var(--linea);border-radius:12px;font-size:16px;background:var(--arena);margin-bottom:14px;font-family:inherit}
  input:focus{outline:none;border-color:var(--tierra)}
  .pad{display:none;background:#e6eef3;color:var(--azul);border:1px dashed var(--azul);border-radius:10px;padding:9px 12px;font-size:12.5px;margin:-6px 0 14px;line-height:1.5}
  .pad.show{display:block}
  button{width:100%;padding:16px;background:var(--tierra);color:#fff;border:none;border-radius:13px;font-size:16.5px;font-weight:800;cursor:pointer;font-family:inherit}
  .err{display:none;background:#fbe9e6;color:var(--rojo);padding:10px 13px;border-radius:10px;font-size:13px;margin-bottom:12px}
  .ok{text-align:center;padding:16px 0}
  .ok .big{font-size:52px}
  .ok h2{font-size:19px;color:var(--selva);margin:10px 0 8px}
  .ok p{font-size:14px;color:var(--gris);line-height:1.55}
  .opt{font-weight:400;text-transform:none;color:var(--gris);font-size:11.5px}
</style>
</head>
<body>
  <div class="card" id="card">
    <h1>🗳 Te buscamos para ir a votar</h1>
    <p class="sub">Dejanos tus datos y el día de la elección te pasamos a buscar y te llevamos de vuelta. Gratis, sin vueltas.</p>
    <div class="err" id="err"></div>
    <label>DNI <span class="opt">(nos ayuda a saber tu escuela y mesa)</span></label>
    <input id="dni" inputmode="numeric" placeholder="Tu DNI" oninput="onDni()">
    <div class="pad" id="padBox"></div>
    <label>Nombre y apellido</label>
    <input id="nom" placeholder="Nombre y apellido" autocomplete="name">
    <label>Teléfono <span class="opt">(para avisarte cuando salga el auto)</span></label>
    <input id="tel" inputmode="tel" placeholder="3757-..." autocomplete="tel">
    <label>Barrio y referencia de tu casa</label>
    <input id="dir" placeholder="Ej: Villa Alta, casa verde frente al kiosco">
    <button id="btn" onclick="enviar()">Quiero que me busquen 🚗</button>
  </div>

<script>
const SUPABASE_URL='https://qgogamniszilcefqvtcq.supabase.co';
const SUPABASE_KEY='sb_publishable_RtlHSBqEDAi-aCfF6ZzKAg_RHg968Cr';
const sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
let PAD=null;

function normDni(s){return (s||'').replace(/\D/g,'');}
async function onDni(){
  const dni=normDni(document.getElementById('dni').value);
  const box=document.getElementById('padBox');
  PAD=null;
  if(dni.length<7){box.className='pad';return;}
  box.className='pad show';box.textContent='Buscando tu mesa...';
  const {data}=await sb.from('padron').select('*').eq('dni',dni).limit(1);
  if(normDni(document.getElementById('dni').value)!==dni)return;
  if(data&&data.length){
    PAD=data[0];
    document.getElementById('nom').value=PAD.nombres+' '+PAD.apellido;
    box.innerHTML='✔ <b>'+PAD.apellido+', '+PAD.nombres+'</b> — votás en la <b>mesa '+PAD.mesa+'</b>';
  }else{
    box.textContent='No encontramos ese DNI en el padrón de Iguazú, pero podés anotarte igual.';
  }
}
async function enviar(){
  const err=document.getElementById('err');err.style.display='none';
  const dni=normDni(document.getElementById('dni').value);
  const nom=document.getElementById('nom').value.trim();
  const tel=document.getElementById('tel').value.trim();
  const dir=document.getElementById('dir').value.trim();
  if(!nom){err.textContent='Poné tu nombre.';err.style.display='block';return;}
  if(!tel){err.textContent='Poné un teléfono para poder avisarte.';err.style.display='block';return;}
  if(!dir){err.textContent='Contanos tu barrio y una referencia, así te encontramos.';err.style.display='block';return;}
  const btn=document.getElementById('btn');btn.textContent='Enviando...';btn.disabled=true;
  try{
    // asignar a coordinación
    const {data:us}=await sb.from('usuarios').select('id,rol,coord,nombre');
    const coord=(us||[]).find(u=>u.rol==='coordinacion')||(us||[]).find(u=>u.coord)||{id:null};
    const partes=nom.split(' ');
    const nombre=partes.slice(0,-1).join(' ')||nom, apellido=partes.slice(-1).join(' ');
    // si el DNI ya está cargado, actualizar en vez de duplicar
    let existente=null;
    if(dni){const {data:ex}=await sb.from('registros').select('id').eq('dni',dni).limit(1);if(ex&&ex.length)existente=ex[0];}
    if(existente){
      await sb.from('registros').update({transporte:true,tel,barrio:dir}).eq('id',existente.id);
    }else{
      const fila={tipo:'persona',nombre:PAD?PAD.nombres:nombre,apellido:PAD?PAD.apellido:apellido,
        dni:dni||null,tel,barrio:dir,estado:'prom',votos_pos:1,transporte:true,voto:false,
        mesa:PAD?PAD.mesa:null,circuito:PAD?PAD.circuito:null,
        ref_id:coord.id,creado_por:coord.id};
      const {error}=await sb.from('registros').insert(fila);
      if(error)throw error;
    }
    document.getElementById('card').innerHTML=`<div class="ok"><div class="big">🎉</div>
      <h2>¡Listo, quedaste anotado!</h2>
      <p>El día de la elección te vamos a contactar al <b>${tel}</b> para coordinar el traslado.${PAD?' Votás en la <b>mesa '+PAD.mesa+'</b> — llevá tu DNI.':''}<br><br>¡Gracias! 💪</p></div>`;
  }catch(e){
    err.textContent='No se pudo enviar: '+(e.message||e);err.style.display='block';
    btn.textContent='Quiero que me busquen 🚗';btn.disabled=false;
  }
}
</script>
</body>
</html>
